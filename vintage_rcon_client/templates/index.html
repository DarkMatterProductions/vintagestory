<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Vintage Story RCon Web Client</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <h1 class="logo">Vintage Story RCon Web Client</h1>
                <div class="header-info">
                    <span id="connection-status" class="status disconnected">Disconnected</span>
                    <span id="user-info" class="user-info" style="display: none;">
                        <span id="username-display"></span>
                        <button id="logout-btn" class="btn btn-secondary">Logout</button>
                    </span>
                </div>
            </div>
        </header>

        <!-- Login Panel -->
        <div id="login-panel" class="panel login-panel">
            <div class="container">
                <div class="card">
                    <h2>Login</h2>

                    <form id="login-form">
                        <div id="traditional-login-section">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" class="form-control" required autocomplete="username">
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-primary btn-block">Login</button>
                            </div>
                            <div id="login-message" class="message"></div>
                        </div>
                    </form>

                    <!-- OAuth Login Buttons -->
                    <div id="oauth-buttons" style="display: none; margin-top: 20px;">
                        <div class="divider">
                            <span>OR</span>
                        </div>
                        <div class="oauth-section">
                            <p class="text-center" style="margin-bottom: 15px;">Login with:</p>
                            <div class="oauth-buttons-row">
                                <a href="/login/oauth/google" id="google-login-btn" class="btn-oauth-icon" style="display: none;" title="Login with Google">

                                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                                        <path fill="none" d="M0 0h48v48H0z"></path>
                                    </svg>
                                </a>
                                <a href="/login/oauth/facebook" id="facebook-login-btn" class="btn-oauth-icon" style="display: none;" title="Login with Facebook">
                                    <svg width="98" height="96" viewBox="0 0 2917 2917" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M2500,1458.33C2500,883.038 2033.63,416.667 1458.33,416.667C883.037,416.667 416.667,883.038 416.667,1458.33C416.667,1946.85 752.979,2356.76 1206.69,2469.33L1206.69,1776.65L991.892,1776.65L991.892,1458.33L1206.69,1458.33L1206.69,1321.17C1206.69,966.621 1367.14,802.287 1715.23,802.287C1781.22,802.287 1895.09,815.225 1941.67,828.167L1941.67,1116.73C1917.08,1114.14 1874.38,1112.84 1821.33,1112.84C1650.53,1112.84 1584.53,1177.54 1584.53,1345.76L1584.53,1458.33L1924.78,1458.33L1866.33,1776.65L1584.53,1776.65L1584.53,2492.37C2100.3,2430.08 2500,1990.91 2500,1458.33" style="fill:#0866ff;"/>
                                        <path d="M1866.32,1776.65L1924.78,1458.34L1584.53,1458.34L1584.53,1345.76C1584.53,1177.54 1650.52,1112.84 1821.33,1112.84C1874.38,1112.84 1917.08,1114.13 1941.67,1116.72L1941.67,828.168C1895.09,815.227 1781.22,802.285 1715.22,802.285C1367.14,802.285 1206.69,966.622 1206.69,1321.17L1206.69,1458.34L991.89,1458.34L991.89,1776.65L1206.69,1776.65L1206.69,2469.33C1287.29,2489.32 1371.56,2500 1458.33,2500C1501.06,2500 1543.16,2497.37 1584.53,2492.37L1584.53,1776.65L1866.32,1776.65Z" style="fill:#fff;"/>
                                    </svg>
                                </a>
                                <a href="/login/oauth/github" id="github-login-btn" class="btn-oauth-icon" style="display: none;" title="Login with GitHub">
                                    <svg width="98" height="96" viewBox="0 0 98 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M41.4395 69.3848C28.8066 67.8535 19.9062 58.7617 19.9062 46.9902C19.9062 42.2051 21.6289 37.0371 24.5 33.5918C23.2559 30.4336 23.4473 23.7344 24.8828 20.959C28.7109 20.4805 33.8789 22.4902 36.9414 25.2656C40.5781 24.1172 44.4062 23.543 49.0957 23.543C53.7852 23.543 57.6133 24.1172 61.0586 25.1699C64.0254 22.4902 69.2891 20.4805 73.1172 20.959C74.457 23.543 74.6484 30.2422 73.4043 33.4961C76.4668 37.1328 78.0937 42.0137 78.0937 46.9902C78.0937 58.7617 69.1934 67.6621 56.3691 69.2891C59.623 71.3945 61.8242 75.9883 61.8242 81.252L61.8242 91.2051C61.8242 94.0762 64.2168 95.7031 67.0879 94.5547C84.4102 87.9512 98 70.6289 98 49.1914C98 22.1074 75.9883 6.69539e-07 48.9043 4.309e-07C21.8203 1.92261e-07 -1.9479e-07 22.1074 -4.3343e-07 49.1914C-6.20631e-07 70.4375 13.4941 88.0469 31.6777 94.6504C34.2617 95.6074 36.75 93.8848 36.75 91.3008L36.75 83.6445C35.4102 84.2188 33.6875 84.6016 32.1562 84.6016C25.8398 84.6016 22.1074 81.1563 19.4277 74.7441C18.375 72.1602 17.2266 70.6289 15.0254 70.3418C13.877 70.2461 13.4941 69.7676 13.4941 69.1934C13.4941 68.0449 15.4082 67.1836 17.3223 67.1836C20.0977 67.1836 22.4902 68.9063 24.9785 72.4473C26.8926 75.2227 28.9023 76.4668 31.2949 76.4668C33.6875 76.4668 35.2187 75.6055 37.4199 73.4043C39.0469 71.7773 40.291 70.3418 41.4395 69.3848Z" fill="black"/>
                                    </svg>
                                </a>
                                <a href="/login/oauth/apple" id="apple-login-btn" class="btn-oauth-icon" style="display: none;" title="Login with Apple">
                                    <svg fill="#000000" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 22 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.09997 22C7.78997 22.05 6.79997 20.68 5.95997 19.47C4.24997 17 2.93997 12.45 4.69997 9.39C5.56997 7.87 7.12997 6.91 8.81997 6.88C10.1 6.86 11.32 7.75 12.11 7.75C12.89 7.75 14.37 6.68 15.92 6.84C16.57 6.87 18.39 7.1 19.56 8.82C19.47 8.88 17.39 10.1 17.41 12.63C17.44 15.65 20.06 16.66 20.09 16.67C20.06 16.74 19.67 18.11 18.71 19.5ZM13 3.5C13.73 2.67 14.94 2.04 15.94 2C16.07 3.17 15.6 4.35 14.9 5.19C14.21 6.04 13.07 6.7 11.95 6.61C11.8 5.46 12.36 4.26 13 3.5Z"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RCon Connection Panel -->
        <div id="connection-panel" class="panel connection-panel" style="display: none;">
            <div class="container">
                <div class="card">
                    <h2>RCon Server Connection</h2>
                    <form id="connection-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="rcon-host">Host</label>
                                <input type="text" id="rcon-host" name="host" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="rcon-port">Port</label>
                                <input type="number" id="rcon-port" name="port" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="rcon-password">Password</label>
                            <input type="password" id="rcon-password" name="password" class="form-control" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <button type="submit" id="connect-btn" class="btn btn-primary">Connect</button>
                            <button type="button" id="disconnect-btn" class="btn btn-danger" style="display: none;">Disconnect</button>
                        </div>
                        <div id="connection-message" class="message"></div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Console Panel -->
        <div id="console-panel" class="panel console-panel" style="display: none;">
            <div class="container">
                <div class="card">
                    <div class="console-header">
                        <h2>Console</h2>
                        <div class="console-info">
                            <span id="server-info"></span>
                        </div>
                    </div>

                    <div class="console-output" id="console-output">
                        <div class="console-line system">
                            <span class="timestamp">[System]</span>
                            <span class="message">Welcome to Vintage Story RCon Web Client</span>
                        </div>
                    </div>

                    <div class="console-input-wrapper">
                        <form id="command-form">
                            <div class="input-group">
                                <span class="input-prefix">></span>
                                <input type="text" id="command-input" class="form-control console-input"
                                       placeholder="Enter command..." autocomplete="off" disabled>
                                <button type="submit" id="send-btn" class="btn btn-primary" disabled>Send</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Main JavaScript -->
    <script src="/static/js/app.js"></script>
</body>
</html>
